<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyramid Tracker｜金字塔解套追蹤器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script type="module">
// ══ FIREBASE INIT ══
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB9bc1ngTUIK5Yn-IUMqMBlwwz7enuxaac",authDomain:"pyramid-tracker-1210c.firebaseapp.com",projectId:"pyramid-tracker-1210c",storageBucket:"pyramid-tracker-1210c.firebasestorage.app",messagingSenderId:"49532699634",appId:"1:49532699634:web:edbe5465e90c4c5969a16b"};
const fbApp=initializeApp(firebaseConfig);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);
const provider=new GoogleAuthProvider();
let currentUser=null,unsubSnap=null;
window._fbSignIn=async()=>{try{await signInWithPopup(auth,provider);}catch(e){alert("登入失敗："+e.message);}};
window._fbSignOut=async()=>{if(unsubSnap){unsubSnap();unsubSnap=null;}await signOut(auth);};
window._fbSave=async(data)=>{if(!currentUser)return;try{await setDoc(doc(db,"users",currentUser.uid,"data","stocks"),{payload:JSON.stringify(data),ts:Date.now()});}catch(e){console.error(e);}};
onAuthStateChanged(auth,user=>{currentUser=user;if(window._onAuthChange)window._onAuthChange(user);if(user){if(unsubSnap)unsubSnap();unsubSnap=onSnapshot(doc(db,"users",user.uid,"data","stocks"),snap=>{if(snap.exists()&&window._onRemoteData)window._onRemoteData(snap.data());});}});
</script>
<style>
:root{
  --bg:#080b12;--bg2:#0d1220;--bg3:#111828;--card:#141d2e;
  --border:#1e2a40;--border2:#253448;--text:#e2e8f8;--text2:#7888aa;--text3:#3d4f6e;
  --accent:#4f8ef7;--accent2:#2563eb;--green:#10c97a;--green2:#052e1a;
  --red:#f06060;--red2:#3d1010;--yellow:#f0b840;--yellow2:#3d2800;--purple:#a78bfa;
  --mono:'DM Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;
  min-height:54px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:6px;}
.logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.08em;}
.logo span{color:var(--text2);}
.main{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 54px);}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-header{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sidebar-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;}
.stock-list{padding:6px;flex:1;overflow-y:auto;}
.stock-item{padding:11px;border-radius:8px;cursor:pointer;margin-bottom:3px;border:1px solid transparent;transition:all .15s;}
.stock-item:hover{background:var(--bg3);border-color:var(--border);}
.stock-item.active{background:var(--card);border-color:var(--accent);}
.stock-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.stock-code{font-family:var(--mono);font-size:13px;font-weight:500;}
.stock-pnl{font-family:var(--mono);font-size:12px;}
.stock-name{font-size:11px;color:var(--text2);margin-bottom:5px;}
.stock-mini{display:flex;gap:6px;flex-wrap:wrap;}
.mini-chip{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text2);}
.alert-dot{width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{overflow-y:auto;padding:22px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3);}
.empty-icon{font-size:44px;opacity:.3;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.stat-value{font-family:var(--mono);font-size:19px;font-weight:500;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
.pos{color:var(--green);}.neg{color:var(--red);}.neu{color:var(--text);}.warn{color:var(--yellow);}
/* PANELS */
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:18px;}
.panel-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
.triggers{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.trigger-item{background:var(--bg3);border-radius:8px;padding:12px;border-left:3px solid var(--border2);}
.trigger-item.sell{border-left-color:var(--red);}
.trigger-item.buy{border-left-color:var(--green);}
.trigger-item.take{border-left-color:var(--yellow);}
.trigger-type{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.trigger-price{font-family:var(--mono);font-size:18px;font-weight:500;}
.trigger-dist{font-size:11px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
.trigger-edit{margin-top:8px;}
.trigger-edit input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:4px 8px;}
.trigger-edit input:focus{outline:none;border-color:var(--accent);}
/* TX TABLE */
.tx-table{width:100%;border-collapse:collapse;}
.tx-table th{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;
  padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.tx-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tx-table tr:last-child td{border-bottom:none;}
.tx-type{font-size:10px;font-weight:500;padding:3px 7px;border-radius:4px;font-family:var(--mono);white-space:nowrap;}
.tx-type.buy{background:var(--green2);color:var(--green);}
.tx-type.sell{background:var(--red2);color:var(--red);}
.tx-type.dca{background:#1e3a5f;color:#60a5fa;}
.tx-mono{font-family:var(--mono);}
.tx-note{font-size:11px;color:var(--text2);}
.delete-btn{opacity:0;transition:opacity .15s;}
tr:hover .delete-btn{opacity:1;}
/* BUTTONS */
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-family:var(--sans);cursor:pointer;
  border:none;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red2);}
.btn-danger:hover{background:var(--red2);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{opacity:.85;}
.btn-red{background:var(--red);color:#fff;}.btn-red:hover{opacity:.85;}
.btn-blue{background:#1d4ed8;color:#fff;}.btn-blue:hover{opacity:.85;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{padding:5px;width:28px;height:28px;justify-content:center;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  transform:translateY(8px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-size:15px;font-weight:600;}
.modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:13px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;color:var(--text2);font-weight:500;}
.form-input{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:var(--sans);font-size:14px;padding:8px 11px;width:100%;}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-hint{font-size:11px;color:var(--text3);margin-top:1px;}
select.form-input{appearance:none;cursor:pointer;}
.close-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;line-height:1;padding:2px;}
.close-btn:hover{color:var(--text);}
.loading-spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.section-divider{display:flex;align-items:center;gap:8px;margin:4px 0 2px;}
.section-divider span{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);}
.badge-yellow{background:var(--yellow2);color:var(--yellow);}
/* SEARCH */
.search-wrap{position:relative;}
#search-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;
  background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);}
.search-item{padding:9px 13px;cursor:pointer;display:flex;justify-content:space-between;
  align-items:center;font-size:13px;border-bottom:1px solid var(--border);}
.search-item:last-child{border-bottom:none;}
.search-item:hover,.search-item.hl{background:var(--bg3);}
.si-code{font-family:var(--mono);color:var(--accent);min-width:72px;flex-shrink:0;}
.si-name{color:var(--text);}
/* ATR BOX */
.atr-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;}
.atr-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;}
.atr-label{color:var(--text2);}
.atr-val{font-family:var(--mono);font-weight:500;}
/* ATR CONTROLS */
.atr-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 8px;}
.atr-ctrl{display:flex;flex-direction:column;gap:4px;}
.atr-ctrl label{font-size:11px;color:var(--text2);}
.atr-ctrl input{background:var(--bg2);border:1px solid var(--border2);border-radius:5px;
  color:var(--text);font-family:var(--mono);font-size:13px;padding:5px 8px;width:100%;}
.atr-ctrl input:focus{outline:none;border-color:var(--accent);}
/* SUGGESTION */
.suggestion-item{display:flex;justify-content:space-between;align-items:center;
  background:var(--bg3);border-radius:6px;padding:8px 12px;margin-bottom:6px;}
.suggestion-label{color:var(--text2);font-size:12px;}
.suggestion-right{display:flex;gap:8px;align-items:center;}
.suggestion-val{font-family:var(--mono);font-weight:500;font-size:13px;}
/* NOTE */
.note-item{display:flex;gap:10px;align-items:flex-start;padding:10px;
  background:var(--bg3);border-radius:6px;margin-bottom:6px;border-left:3px solid var(--border2);}
.note-item.warn{border-left-color:var(--yellow);}
.note-item.info{border-left-color:var(--accent);}
.note-text{font-size:13px;margin-bottom:2px;}
.note-date{font-size:11px;color:var(--text2);font-family:var(--mono);}
/* MOBILE */
@media(max-width:768px){
  .main{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .sidebar.mobile-open{display:flex;position:fixed;top:0;left:0;right:0;bottom:0;margin-top:54px;z-index:90;}
  .content{padding:14px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .triggers{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .atr-controls{grid-template-columns:1fr 1fr;}
  .mobile-btn{display:flex!important;}
  .tx-table th:nth-child(4),.tx-table td:nth-child(4),
  .tx-table th:nth-child(5),.tx-table td:nth-child(5){display:none;}
  /* header 按鈕群在手機換行時補上 padding */
  header{padding:8px 14px;}
  .header-right{flex-wrap:wrap;justify-content:flex-end;}
}
.mobile-btn{display:none;}
</style>
</head>
<body>
<div class="app">
<header>
  <div>
    <div class="logo">PYRAMID<span>.TRACKER</span></div>
    <div style="font-size:10px;color:var(--text3);letter-spacing:.06em;margin-top:1px">金字塔解套追蹤器</div>
  </div>
  <div class="header-right" style="display:flex;gap:7px;align-items:center">
    <button class="btn btn-ghost btn-sm mobile-btn" onclick="toggleSidebar()">☰</button>
    <div id="auth-area" style="display:flex;align-items:center;gap:7px">
      <button id="btn-signin" class="btn btn-ghost btn-sm" onclick="window._fbSignIn()" style="border-color:var(--accent);color:var(--accent)">
        <svg width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        登入
      </button>
      <div id="user-info" style="display:none;align-items:center;gap:6px">
        <img id="user-avatar" width="22" height="22" style="border-radius:50%;flex-shrink:0" src="">
        <span id="user-name" style="font-size:12px;color:var(--text2);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <div id="sync-dot" style="width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0" title="同步狀態"></div>
        <button class="btn btn-ghost btn-sm" onclick="window._fbSignOut()">登出</button>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ 匯出</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">
      ⬆ 匯入<input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
    <button class="btn btn-primary btn-sm" onclick="openAddStock()">＋ 新增股票</button>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">持倉股票</span>
      <span id="stock-count" style="font-family:var(--mono);font-size:12px;color:var(--text2)">0 檔</span>
    </div>
    <div class="stock-list" id="stock-list"></div>
  </div>
  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">📊</div>
      <p style="font-size:15px;color:var(--text2)">尚無持倉股票</p>
      <p style="font-size:13px;color:var(--text3)">點擊右上角「新增股票」開始記錄</p>
      <button class="btn btn-primary" onclick="openAddStock()">＋ 新增第一檔股票</button>
    </div>
    <div id="stock-detail" style="display:none"></div>
  </div>
</div>
</div>

<!-- ADD STOCK MODAL -->
<div class="modal-overlay" id="modal-add" onclick="if(event.target===this)closeModal('modal-add')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">新增股票</span>
      <button class="close-btn" onclick="closeModal('modal-add')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group search-wrap">
        <label class="form-label">搜尋股票（代號或名稱）</label>
        <input class="form-input" id="stock-search" placeholder="輸入代號或中文名稱，例：2330 或 台積電"
          autocomplete="off" oninput="onStockSearch(this.value)" onkeydown="onSearchKey(event)">
        <div id="search-dropdown"></div>
      </div>
      <div id="selected-badge" style="display:none;background:var(--bg3);border:1px solid var(--border2);
        border-radius:8px;padding:9px 13px;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-family:var(--mono);font-weight:500;color:var(--accent)" id="badge-code"></span>
          <span style="color:var(--text2);margin-left:8px;font-size:13px" id="badge-name"></span>
        </div>
        <button class="btn btn-ghost btn-sm" type="button" onclick="clearSelection()">重新選擇</button>
      </div>
      <input type="hidden" id="add-code">
      <input type="hidden" id="add-name">

      <div class="section-divider"><span>建倉資訊</span></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">買入價格（元）</label>
          <input class="form-input" id="add-price" type="number" step="0.01" placeholder="自動帶入收盤價" oninput="computeSuggestions()">
        </div>
        <div class="form-group">
          <label class="form-label">買入股數</label>
          <input class="form-input" id="add-shares" type="number" placeholder="例：10000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">建倉日期</label>
          <input class="form-input" id="add-date" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">備註</label>
          <input class="form-input" id="add-note" placeholder="例：基本面良好">
        </div>
      </div>

      <div id="atr-section" style="display:none">
        <div class="section-divider"><span>ATR 自動建議</span></div>
        <div id="atr-info" class="atr-box">
          <div class="atr-row"><span class="atr-label">狀態</span><span class="atr-val"><span class="loading-spinner"></span> 抓取中…</span></div>
        </div>
        <div class="atr-controls">
          <div class="atr-ctrl">
            <label>ATR 天數（預設14）</label>
            <input type="number" id="atr-days" value="14" min="5" max="60" onchange="computeSuggestions()">
          </div>
          <div class="atr-ctrl">
            <label>減倉 ATR 倍數（預設3）</label>
            <input type="number" id="atr-sell-mult" value="3" min="0.5" max="20" step="0.5" onchange="computeSuggestions()">
          </div>
          <div class="atr-ctrl">
            <label>補倉 ATR 倍數（預設5）</label>
            <input type="number" id="atr-buy-mult" value="5" min="0.5" max="20" step="0.5" onchange="computeSuggestions()">
          </div>
          <div class="atr-ctrl">
            <label>高拋 ATR 倍數（預設2）</label>
            <input type="number" id="atr-take-mult" value="2" min="0.5" max="20" step="0.5" onchange="computeSuggestions()">
          </div>
        </div>
        <div id="suggestions"></div>
      </div>

      <div class="section-divider"><span>觸發點（可手動覆蓋建議值）</span></div>
      <div class="form-group">
        <label class="form-label">減倉觸發價 — 跌至此價賣出一半持股</label>

<script>
// ══ CONFIG ══
const FM_TOKEN='eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoiYjIyNTU0MDQ3IiwiZW1haWwiOiJiMjI1NTQwNDdAZ21haWwuY29tIiwidG9rZW5fdmVyc2lvbiI6MH0.TcnPVxtRZVOXcmSl8IG93BH6sdaqyZRhF71r-XsOcNQ';
const FM_URL='https://api.finmindtrade.com/api/v4/data';
const STORE_KEY='pyramid_v3';

// ══ STATE ══
function loadState(){
  try{ const r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{stocks:[]}; }
  catch(e){ return {stocks:[]}; }
}
let state=loadState();
window._localState=state;
let activeId=null;
let atrRawData=[];
let isSyncing=false;

function saveState(){
  try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){}
  // 同步到 Firestore（若已登入）
  if(window._fbSave){
    isSyncing=true; setSyncDot('syncing');
    window._fbSave(state).then(()=>{ isSyncing=false; setSyncDot('ok'); })
      .catch(()=>{ isSyncing=false; setSyncDot('error'); });
  }
}

function setSyncDot(status){
  const dot=document.getElementById('sync-dot');
  if(!dot) return;
  const colors={ok:'var(--green)',syncing:'var(--yellow)',error:'var(--red)'};
  const titles={ok:'已同步',syncing:'同步中…',error:'同步失敗'};
  dot.style.background=colors[status]||'var(--text3)';
  dot.title=titles[status]||'';
}

// ══ FIREBASE CALLBACKS ══
window._onAuthChange = (user) => {
  const btnSignin=document.getElementById('btn-signin');
  const userInfo=document.getElementById('user-info');
  const avatar=document.getElementById('user-avatar');
  const userName=document.getElementById('user-name');
  if(user){
    btnSignin.style.display='none';
    userInfo.style.display='flex';
    avatar.src=user.photoURL||'';
    userName.textContent=user.displayName||user.email||'';
    setSyncDot('ok');
  } else {
    btnSignin.style.display='flex';
    userInfo.style.display='none';
  }
};

window._onRemoteData = (data) => {
  if(!data?.payload) return;
  try{
    const remote=JSON.parse(data.payload);
    if(!remote?.stocks) return;
    // 合併：Firestore 為主，保留本地有但 remote 沒有的股票
    const remoteIds=new Set(remote.stocks.map(s=>s.id));
    const localOnly=(state.stocks||[]).filter(s=>!remoteIds.has(s.id));
    state.stocks=[...remote.stocks,...localOnly];
    window._localState=state;
    try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); }catch(e){}
    render();
    setSyncDot('ok');
  }catch(e){}
};

// ══ UTILS ══
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmt(n,d=2){ return isNaN(n)||n===null?'—':Number(n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function today(){ return new Date().toISOString().slice(0,10); }
function daysSince(d){ return Math.max(0,Math.floor((Date.now()-new Date(d))/86400000)); }

// ══ STOCK CALC ══
// dca & buy → add to cost basis; sell → reduce proportionally
function calcStock(s){
  let shares=s.initShares, costTotal=s.initPrice*s.initShares;
  for(const tx of (s.transactions||[])){
    if(tx.type==='buy'||tx.type==='dca'){
      costTotal+=tx.price*tx.shares; shares+=tx.shares;
    } else {
      const cpp=shares>0?costTotal/shares:0;
      costTotal-=cpp*tx.shares; shares-=tx.shares;
    }
  }
  return { shares, avgCost:shares>0?costTotal/shares:0, costTotal };
}

// ══ RENDER ══
function render(){ renderSidebar(); activeId?selectStock(activeId,false):showEmpty(); }
function showEmpty(){
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('stock-detail').style.display='none';
}
function renderSidebar(){
  document.getElementById('stock-count').textContent=state.stocks.length+' 檔';
  const list=document.getElementById('stock-list');
  if(!state.stocks.length){
    list.innerHTML='<div style="padding:18px;text-align:center;color:var(--text3);font-size:13px">尚無持倉</div>';
    return;
  }
  list.innerHTML=state.stocks.map(s=>{
    const c=calcStock(s);
    const price=s.currentPrice??c.avgCost;
    const pct=c.avgCost>0?(price-c.avgCost)/c.avgCost*100:0;
    const alert=nearTrigger(s,price);
    return `<div class="stock-item ${s.id===activeId?'active':''}" onclick="selectStock('${s.id}')">
      <div class="stock-item-header">
        <span class="stock-code">${s.code}</span>
        <div style="display:flex;align-items:center;gap:5px">
          ${alert?'<div class="alert-dot"></div>':''}
          <span class="stock-pnl ${pct>=0?'pos':'neg'}">${pct>=0?'+':''}${fmt(pct,1)}%</span>
        </div>
      </div>
      <div class="stock-name">${s.name}</div>
      <div class="stock-mini">
        <span class="mini-chip">${fmt(c.shares,0)} 股</span>
        <span class="mini-chip">均 $${fmt(c.avgCost)}</span>
      </div>
    </div>`;
  }).join('');
}

function nearTrigger(s,price){
  if(!price) return false;
  return [s.triggers?.sell1,s.triggers?.buy2,s.triggers?.take].some(t=>t&&Math.abs(price-t)/t<0.03);
}

function selectStock(id, updateSidebar=true){
  activeId=id;
  const s=state.stocks.find(x=>x.id===id);
  if(!s){ showEmpty(); return; }
  document.getElementById('empty-state').style.display='none';
  document.getElementById('stock-detail').style.display='block';
  renderDetail(s);
  if(updateSidebar) renderSidebar();
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function renderDetail(s){
  const c=calcStock(s);
  const price=s.currentPrice??c.avgCost;
  const pnlPct=c.avgCost>0?(price-c.avgCost)/c.avgCost*100:0;
  const pnlAmt=(price-c.avgCost)*c.shares;
  const t=s.triggers||{};
  const totalVal=price*c.shares;

  function dist(trigger){
    if(!trigger||!price) return '未設定';
    const d=trigger-price, p=d/price*100;
    return `${d>=0?'+':''}${fmt(d)} (${p>=0?'+':''}${fmt(p,1)}%)`;
  }
  function distColor(trigger){
    if(!trigger||!price) return 'var(--text3)';
    const pct=Math.abs((trigger-price)/price*100);
    return pct<3?'var(--yellow)':'var(--text2)';
  }

  const typeLabel={buy:'補倉',sell:'減倉',dca:'定期定額'};
  const typeClass={buy:'buy',sell:'sell',dca:'dca'};

  const txRows=(s.transactions||[]).slice().reverse().map(tx=>`
    <tr>
      <td><span class="tx-type ${typeClass[tx.type]||'buy'}">${typeLabel[tx.type]||tx.type}</span></td>
      <td class="tx-mono">$${fmt(tx.price)}</td>
      <td class="tx-mono">${fmt(tx.shares,0)}</td>
      <td class="tx-mono">$${fmt(tx.price*tx.shares,0)}</td>
      <td><span class="tx-note">${tx.flag?'⚠ ':''}${tx.note||'—'}</span></td>
      <td class="tx-mono" style="color:var(--text3);font-size:11px">${tx.date}</td>

    </tr>`).join('');

  const notes=(s.notes||[]).slice().reverse().map(n=>`
    <div class="note-item ${n.type}">
      <div style="font-size:16px">${n.type==='warn'?'⚠️':'ℹ️'}</div>
      <div style="flex:1"><div class="note-text">${n.text}</div><div class="note-date">${n.date}</div></div>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteNote('${s.id}','${n.id}')">×</button>
    </div>`).join('');

  document.getElementById('stock-detail').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
          <h1 style="font-size:26px;font-weight:700;font-family:var(--mono)">${s.code}</h1>
          <span style="font-size:17px;color:var(--text2)">${s.name}</span>
        </div>
        <p style="font-size:12px;color:var(--text3);margin-top:4px">

          ${s.note?`&nbsp;·&nbsp; ${s.note}`:''}
        </p>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
        <div style="font-size:11px;color:var(--text2)">目前股價（手動更新）</div>
        <div style="display:flex;gap:6px">
          <input class="form-input" id="price-input" type="number" step="0.01" value="${s.currentPrice??''}"
            placeholder="輸入現價" style="width:110px;padding:6px 9px;font-size:14px;font-family:var(--mono)">
          <button class="btn btn-ghost btn-sm" onclick="updatePrice('${s.id}')">更新</button>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">均攤成本</div>
        <div class="stat-value neu">$${fmt(c.avgCost)}</div>
        <div class="stat-sub">每股（含全部建倉）</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">持有股數</div>
        <div class="stat-value neu">${fmt(c.shares,0)}</div>
        <div class="stat-sub">股</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">帳面損益</div>
        <div class="stat-value ${pnlPct>=0?'pos':'neg'}">${pnlPct>=0?'+':''}${fmt(pnlPct,1)}%</div>
        <div class="stat-sub ${pnlAmt>=0?'pos':'neg'}">${pnlAmt>=0?'+':''}$${fmt(Math.abs(pnlAmt),0)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">持倉市值</div>
        <div class="stat-value neu">$${fmt(totalVal,0)}</div>
        <div class="stat-sub">@$${fmt(price)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">交易筆數</div>
        <div class="stat-value neu">${(s.transactions||[]).length}</div>
        <div class="stat-sub">DCA+補倉+減倉</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">持倉天數</div>
        <div class="stat-value neu">${daysSince(s.initDate)}</div>
        <div class="stat-sub">天</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">
        操作觸發點
        ${nearTrigger(s,price)?'<span class="badge badge-yellow">⚠ 接近觸發</span>':''}
      </div>
      <div class="triggers">
        <div class="trigger-item sell">
          <div class="trigger-type">減倉觸發（賣出一半）</div>

          <div class="trigger-dist" style="color:${distColor(t.sell1)}">${dist(t.sell1)}</div>
          <div class="trigger-edit">
            <input type="number" step="0.01" value="${t.sell1||''}" placeholder="手動設定"
              onchange="updateTrigger('${s.id}','sell1',this.value)">
          </div>
        </div>
        <div class="trigger-item buy">
          <div class="trigger-type">補倉觸發（全押現金）</div>
          <div class="trigger-price pos">$${t.buy2?fmt(t.buy2):'—'}</div>
          <div class="trigger-dist" style="color:${distColor(t.buy2)}">${dist(t.buy2)}</div>
          <div class="trigger-edit">
            <input type="number" step="0.01" value="${t.buy2||''}" placeholder="手動設定"
              onchange="updateTrigger('${s.id}','buy2',this.value)">

        <div class="trigger-item take">
          <div class="trigger-type">高拋觸發（再減倉）</div>
          <div class="trigger-price warn">$${t.take?fmt(t.take):'—'}</div>

function buildViz(s,c,price){
  const t=s.triggers||{};
  const pts=[s.initPrice,price,c.avgCost];
  if(t.sell1) pts.push(t.sell1);
  if(t.buy2)  pts.push(t.buy2);
  if(t.take)  pts.push(t.take);
  (s.transactions||[]).forEach(tx=>pts.push(tx.price));
  const minP=Math.min(...pts)*0.94, maxP=Math.max(...pts)*1.06;
  const W=540,H=130,PL=58,PR=18;
  const px=p=>PL+(p-minP)/(maxP-minP)*(W-PL-PR);

  let svg=`<svg viewBox="0 0 ${W} ${H+20}" width="100%" style="overflow:visible">`;
  svg+=`<text x="${PL-4}" y="12" text-anchor="end" fill="var(--text3)" font-size="9" font-family="var(--mono)">$${fmt(maxP,0)}</text>`;
  svg+=`<text x="${PL-4}" y="${H+4}" text-anchor="end" fill="var(--text3)" font-size="9" font-family="var(--mono)">$${fmt(minP,0)}</text>`;
  svg+=`<line x1="${PL}" y1="6" x2="${W-PR}" y2="6" stroke="var(--border)" stroke-width="0.5"/>`;
  svg+=`<line x1="${PL}" y1="${H}" x2="${W-PR}" y2="${H}" stroke="var(--border)" stroke-width="0.5"/>`;

  function vline(val,color,label){
    if(!val) return '';
    const x=px(val);
    return `<line x1="${x}" y1="5" x2="${x}" y2="${H+1}" stroke="${color}" stroke-width="1.2" stroke-dasharray="4 3" opacity=".85"/>
      <text x="${x}" y="${H+14}" text-anchor="middle" fill="${color}" font-size="9" font-family="var(--mono)">${label} $${fmt(val)}</text>`;
  }
  svg+=vline(t.buy2,'#10b981','補');
  svg+=vline(t.sell1,'#ef4444','減');
  svg+=vline(t.take,'#f59e0b','拋');

  // avg cost
  const ax=px(c.avgCost);
  svg+=`<line x1="${ax}" y1="5" x2="${ax}" y2="${H+1}" stroke="#8b5cf6" stroke-width="1.5" opacity=".75"/>`;
  svg+=`<text x="${ax}" y="${H+14}" text-anchor="middle" fill="#8b5cf6" font-size="9" font-family="var(--mono)">均 $${fmt(c.avgCost)}</text>`;

  // tx dots
  (s.transactions||[]).forEach(tx=>{
    const col=tx.type==='sell'?'#ef4444':tx.type==='dca'?'#60a5fa':'#10b981';
    svg+=`<circle cx="${px(tx.price)}" cy="${H/2}" r="5" fill="${col}" opacity=".9"/>`;
  });

  // current price arrow
  const cp=px(price);
  svg+=`<line x1="${cp}" y1="4" x2="${cp}" y2="${H+1}" stroke="var(--text)" stroke-width="2"/>`;
  svg+=`<polygon points="${cp},2 ${cp-5},10 ${cp+5},10" fill="var(--text)"/>`;
  svg+=`<text x="${cp}" y="${H+14}" text-anchor="middle" fill="var(--text)" font-size="9" font-family="var(--mono)" font-weight="600">現 $${fmt(price)}</text>`;
  svg+='</svg>';
  return svg;
}

// ══ ACTIONS ══
function updatePrice(id){
  const v=parseFloat(document.getElementById('price-input').value);
  if(isNaN(v)) return;
  const s=state.stocks.find(x=>x.id===id);
  s.currentPrice=v; saveState(); renderDetail(s); renderSidebar();
}
function updateTrigger(id,key,val){
  const s=state.stocks.find(x=>x.id===id);
  if(!s.triggers) s.triggers={};
  s.triggers[key]=parseFloat(val)||null;
  saveState(); renderSidebar();
}
function deleteTx(sid,tid){
  const s=state.stocks.find(x=>x.id===sid);
  s.transactions=(s.transactions||[]).filter(t=>t.id!==tid);
  saveState(); renderDetail(s); renderSidebar();
}
function deleteNote(sid,nid){
  const s=state.stocks.find(x=>x.id===sid);
  s.notes=(s.notes||[]).filter(n=>n.id!==nid);
  saveState(); renderDetail(s);
}
function deleteStock(id){
  if(!confirm('確定刪除此股票的所有記錄？')) return;
  state.stocks=state.stocks.filter(x=>x.id!==id);
  activeId=state.stocks[0]?.id||null;
  saveState(); render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`pyramid_${today()}.json`; a.click();
}
function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.stocks) throw new Error('格式錯誤');
      state=d; saveState();
      activeId=state.stocks[0]?.id||null;
      render();
      alert(`✅ 匯入成功，共 ${state.stocks.length} 檔股票`);
    }catch(err){ alert('匯入失敗：'+err.message); }
  };
  r.readAsText(file); e.target.value='';
}

let hlIdx=-1;
function onStockSearch(val){
  hlIdx=-1;
  const dd=document.getElementById('search-dropdown');
  if(!val||val.length<1){dd.style.display='none';return;}
  const kw=val.toLowerCase();
  const res=TW_STOCKS.filter(([c,n])=>c.toLowerCase().startsWith(kw)||n.includes(val)).slice(0,12);
  if(!res.length){dd.style.display='none';return;}
  dd.style.display='block';
  dd.innerHTML=res.map(([c,n],i)=>
    `<div class="search-item" data-c="${c}" data-n="${n}" data-i="${i}"
      onmousedown="selectItem('${c}','${n}')" onmouseover="hlItem(${i})">
      <span class="si-code">${c}</span><span class="si-name">${n}</span>
    </div>`
  ).join('');
}
function hlItem(i){
  hlIdx=i;
  document.querySelectorAll('#search-dropdown .search-item').forEach((el,j)=>el.classList.toggle('hl',j===i));
}
function onSearchKey(e){
  const items=document.querySelectorAll('#search-dropdown .search-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){e.preventDefault();hlItem(Math.min(hlIdx+1,items.length-1));}
  if(e.key==='ArrowUp'){e.preventDefault();hlItem(Math.max(hlIdx-1,0));}
  if(e.key==='Enter'&&hlIdx>=0){const el=items[hlIdx];selectItem(el.dataset.c,el.dataset.n);}
  if(e.key==='Escape') document.getElementById('search-dropdown').style.display='none';
}

// ══ ATR / FINMIND ══
async function fetchATR(code){
  if(!code) return;
  document.getElementById('atr-section').style.display='block';
  document.getElementById('atr-info').innerHTML=
    '<div class="atr-row"><span class="atr-label">狀態</span><span class="atr-val"><span class="loading-spinner"></span> FinMind 資料抓取中…</span></div>';
  document.getElementById('suggestions').innerHTML='';
  atrRawData=[];

  const start=new Date(); start.setDate(start.getDate()-90);
  const startStr=start.toISOString().slice(0,10);

  try{
    const params=new URLSearchParams({dataset:'TaiwanStockPrice',data_id:code,start_date:startStr,token:FM_TOKEN});
    const res=await fetch(`${FM_URL}?${params}`,{signal:AbortSignal.timeout(12000)});
    const json=await res.json();
    if(json.status!==200||!json.data?.length) throw new Error(json.msg||'no data');
    atrRawData=json.data;
    const last=atrRawData[atrRawData.length-1];
    const lastClose=parseFloat(last.close);
    if(!document.getElementById('add-price').value&&lastClose)
      document.getElementById('add-price').value=lastClose.toFixed(2);
    renderATRBox(lastClose,last.date);
    computeSuggestions();
  }catch(e){
    document.getElementById('atr-info').innerHTML=
      `<div class="atr-row"><span class="atr-label">狀態</span><span class="atr-val" style="color:var(--text2)">資料抓取失敗，改用固定比例建議</span></div>`;
    computeSuggestions();
  }
}

function calcATR(days){
  if(atrRawData.length<2) return null;
  let sum=0,cnt=0;
  for(let i=1;i<atrRawData.length;i++){
    const h=parseFloat(atrRawData[i].max),l=parseFloat(atrRawData[i].min),pc=parseFloat(atrRawData[i-1].close);
    const tr=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    if(!isNaN(tr)&&tr>0){sum+=tr;cnt++;}
    if(cnt>=days) break;
  }
  return cnt>0?sum/cnt:null;
}

function renderATRBox(lastClose,lastDate){
  const days=parseInt(document.getElementById('atr-days').value)||14;
  const atr=calcATR(days);
  const pct=atr&&lastClose?(atr/lastClose*100).toFixed(2):null;
  document.getElementById('atr-info').innerHTML=`
    <div class="atr-row"><span class="atr-label">資料來源</span><span class="atr-val" style="color:var(--text2);font-size:11px">FinMind &nbsp;·&nbsp; ${lastDate}</span></div>
    <div class="atr-row"><span class="atr-label">最新收盤</span><span class="atr-val">$${fmt(lastClose)}</span></div>
    <div class="atr-row"><span class="atr-label">${days} 日 ATR</span><span class="atr-val warn">$${atr?fmt(atr):'資料不足'}</span></div>
    <div class="atr-row"><span class="atr-label">ATR 佔股價</span><span class="atr-val">${pct?pct+'%':'—'}</span></div>`;
}

function computeSuggestions(){
  const price=parseFloat(document.getElementById('add-price').value);
  if(!price) return;
  const days=parseInt(document.getElementById('atr-days').value)||14;
  const sm=parseFloat(document.getElementById('atr-sell-mult').value)||3;
  const bm=parseFloat(document.getElementById('atr-buy-mult').value)||5;
  const tm=parseFloat(document.getElementById('atr-take-mult').value)||2;

  if(atrRawData.length){
    const last=atrRawData[atrRawData.length-1];
    renderATRBox(parseFloat(last.close),last.date);
  }

  const atr=calcATR(days);
  let sell1,buy2,take,method;
  if(atr){
    sell1=Math.max(0,price-sm*atr);
    buy2=Math.max(0,price-bm*atr);
    take=price+tm*atr;
    method=`ATR(${days}) × ${sm} / × ${bm} / × ${tm}`;
  } else {
    sell1=price*0.70; buy2=price*0.50; take=price*1.20;
    method='固定比例：-30% / -50% / +20%';
  }

  document.getElementById('suggestions').innerHTML=`
    <div style="font-size:11px;color:var(--text3);margin-bottom:7px;padding:0 2px">${method}</div>
    <div class="suggestion-item">
      <span class="suggestion-label">建議減倉觸發</span>
      <div class="suggestion-right">
        <span class="suggestion-val neg">$${fmt(sell1)}</span>
        <button class="btn btn-ghost btn-sm" type="button" onclick="applySugg('add-sell1',${sell1.toFixed(2)})">套用</button>
      </div>
    </div>
    <div class="suggestion-item">
      <span class="suggestion-label">建議補倉觸發</span>
      <div class="suggestion-right">
        <span class="suggestion-val pos">$${fmt(buy2)}</span>
        <button class="btn btn-ghost btn-sm" type="button" onclick="applySugg('add-buy2',${buy2.toFixed(2)})">套用</button>
      </div>
    </div>
    <div class="suggestion-item">
      <span class="suggestion-label">建議高拋觸發</span>
      <div class="suggestion-right">
        <span class="suggestion-val warn">$${fmt(take)}</span>
        <button class="btn btn-ghost btn-sm" type="button" onclick="applySugg('add-take',${take.toFixed(2)})">套用</button>
      </div>
    </div>`;
}

function applySugg(id,val){
  const el=document.getElementById(id);
  if(el){ el.value=Number(val).toFixed(2); }
}

function updateTxHint(){
  const hints={
    dca:'定期定額：與初始建倉合併計算均攤成本，不佔用補倉次數統計',
    buy:'補倉：金字塔加碼，計入均攤成本並更新持股數',
    sell:'減倉 / 高拋：按比例降低持股，不影響剩餘成本'
  };
  const t=document.getElementById('tx-type').value;
  document.getElementById('tx-type-hint').textContent=hints[t]||'';
}
document.getElementById('tx-type').addEventListener('change',updateTxHint);

function submitTx(){
  const price=parseFloat(document.getElementById('tx-price').value);
  const shares=parseInt(document.getElementById('tx-shares').value);
  if(isNaN(price)||isNaN(shares)||shares<=0){alert('請填寫價格和股數');return;}
  const s=state.stocks.find(x=>x.id===txStockId);
  if(!s.transactions) s.transactions=[];
  s.transactions.push({
    id:uid(),type:document.getElementById('tx-type').value,
    price,shares,date:document.getElementById('tx-date').value,
    note:document.getElementById('tx-note').value.trim(),
    flag:document.getElementById('tx-flag').checked
  });
  s.currentPrice=price;
  saveState(); closeModal('modal-tx'); selectStock(txStockId);
}

// ══ NOTE MODAL ══
let noteStockId=null;
function openNote(sid){
  noteStockId=sid;
  document.getElementById('note-text').value='';
  document.getElementById('note-date').value=today();
  openModal('modal-note');
  setTimeout(()=>document.getElementById('note-text').focus(),200);
}
function submitNote(){
  const text=document.getElementById('note-text').value.trim();
  if(!text){alert('請填寫事件描述');return;}
  const s=state.stocks.find(x=>x.id===noteStockId);
  if(!s.notes) s.notes=[];
  s.notes.push({id:uid(),type:document.getElementById('note-type').value,text,date:document.getElementById('note-date').value});
  saveState(); closeModal('modal-note'); selectStock(noteStockId);
}

// ══ MISC ══
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('mobile-open'); }

// ══ INIT ══
render();
</script>
